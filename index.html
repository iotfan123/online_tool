<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电阻并联计算器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .calc-container {
            background: #ffffff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
        }
        h3 { margin-top: 0; color: #333; text-align: center; }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
        }
        input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ccd0d5;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            padding: 6px 12px;
            background-color: #ff4d4f;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .add-btn {
            background-color: #1890ff;
            width: 100%;
            padding: 10px;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .result-box {
            background-color: #f6ffed;
            border: 1px solid #b7eb8f;
            padding: 16px;
            border-radius: 6px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #52c41a;
        }
    </style>
</head>
<body>

<div class="calc-container">
    <h3>电阻并联计算器</h3>
    <div id="inputs-wrapper">
        <div class="input-group">
            <input type="number" class="resistor-input" placeholder="电阻 1 (Ω)" oninput="calculateParallel()">
            <button onclick="removeInput(this)">删除</button>
        </div>
        <div class="input-group">
            <input type="number" class="resistor-input" placeholder="电阻 2 (Ω)" oninput="calculateParallel()">
            <button onclick="removeInput(this)">删除</button>
        </div>
    </div>
    
    <button class="add-btn" onclick="addInput()">+ 添加电阻</button>
    
    <div class="result-box">
        等效并联电阻: <span id="result">0.00</span> Ω
    </div>
</div>

<script>
    function addInput() {
        const wrapper = document.getElementById('inputs-wrapper');
        const count = wrapper.children.length + 1;
        const div = document.createElement('div');
        div.className = 'input-group';
        div.innerHTML = `
            <input type="number" class="resistor-input" placeholder="电阻 ${count} (Ω)" oninput="calculateParallel()">
            <button onclick="removeInput(this)">删除</button>
        `;
        wrapper.appendChild(div);
    }

    function removeInput(btn) {
        const wrapper = document.getElementById('inputs-wrapper');
        if (wrapper.children.length > 1) {
            btn.parentElement.remove();
            calculateParallel();
        } else {
            alert('请至少保留一个电阻！');
        }
    }

    function calculateParallel() {
        const inputs = document.querySelectorAll('.resistor-input');
        let sumOfReciprocals = 0;
        let hasValidInput = false;

        inputs.forEach(input => {
            const val = parseFloat(input.value);
            if (!isNaN(val) && val > 0) {
                sumOfReciprocals += (1 / val);
                hasValidInput = true;
            }
        });

        const resultSpan = document.getElementById('result');
        if (hasValidInput && sumOfReciprocals > 0) {
            const totalR = 1 / sumOfReciprocals;
            resultSpan.innerText = totalR.toFixed(2);
        } else {
            resultSpan.innerText = '0.00';
        }
    }
</script>

</body>
</html>
